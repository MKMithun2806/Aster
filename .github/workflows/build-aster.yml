name: Build and Update Aster Release

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]
    branches: [ main ]

jobs:
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Aster directly to releases folder
        run: cargo build --release --target-dir releases --verbose

      - name: Copy built executable to releases/Aster.exe
        run: |
          Copy-Item -Path "releases/x86_64-pc-windows-msvc/release/Aster.exe" -Destination "releases/Aster.exe" -Force

      - name: Clean up nested build folders
        run: |
          Remove-Item -Path "releases/x86_64-pc-windows-msvc" -Recurse -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Commit and push updated Aster.exe
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
        run: |
          git config user.name "MKMithun2806"
          git config user.email "mmithunkrish@gmail.com"
          
          git add releases/Aster.exe
          
          # Check if there are changes
          if git diff --staged --quiet; then
            echo "No changes to Aster.exe"
            exit 0
          fi
          
          git commit -m "chore: update Aster.exe with latest build [skip ci]"
          git push
        shell: pwsh
